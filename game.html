<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>数字タッチ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Arial', sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 12px 8px;
    }

    #game-container {
      width: 100%;
      max-width: 420px;
    }

    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      padding: 0 2px;
    }

    #level-display { font-size: 16px; color: #aaa; }

    #target-display {
      font-size: 20px;
      font-weight: bold;
      background: #0f3460;
      padding: 5px 16px;
      border-radius: 20px;
    }

    #time-display {
      font-size: 20px;
      font-weight: bold;
      font-variant-numeric: tabular-nums;
      min-width: 56px;
      text-align: right;
    }

    #timer-bar-container {
      width: 100%;
      height: 8px;
      background: #333;
      border-radius: 4px;
      margin-bottom: 6px;
      overflow: hidden;
    }

    #timer-bar {
      height: 100%;
      width: 100%;
      background: #00e676;
      border-radius: 4px;
      transition: background-color 0.4s;
    }

    #shuffle-info {
      text-align: center;
      font-size: 12px;
      color: #88aacc;
      margin-bottom: 8px;
    }

    #play-area {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 5;
      background: #16213e;
      border-radius: 16px;
      border: 2px solid #0f3460;
      overflow: hidden;
    }

    .num-btn {
      position: absolute;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid #1a4a8a;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      background: #0d2c5e;
      color: #cce;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      transition: left 0.18s ease, top 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* 物理モード中はCSS transitionを無効化 */
    .num-btn.physics {
      transition: none !important;
    }

    .num-btn:active {
      background: #1a5faa;
      border-color: #4a9eff;
      color: #fff;
      transform: scale(1.08);
    }

    .num-btn.correct {
      background: #00e676 !important;
      border-color: #00e676;
      color: #000;
      transform: scale(1.2);
      pointer-events: none;
      z-index: 10;
    }

    .num-btn.wrong {
      animation: shake 0.3s ease;
      background: #c62828;
      border-color: #ff5252;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-7px); }
      60%       { transform: translateX(7px); }
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 10, 30, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      gap: 12px;
      padding: 24px;
    }

    #overlay h2 {
      font-size: 30px;
      letter-spacing: 2px;
    }

    #overlay .sub {
      font-size: 14px;
      color: #88aacc;
      text-align: center;
      line-height: 1.8;
    }

    #overlay .next-info {
      font-size: 13px;
      color: #aaa;
      text-align: center;
    }

    .action-btn {
      padding: 13px 44px;
      font-size: 17px;
      border: none;
      border-radius: 30px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      margin-top: 6px;
      letter-spacing: 1px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .action-btn:active { background: #c73050; }

    .best-badge {
      font-size: 13px;
      color: #ffd700;
    }
  </style>
</head>
<body>
<div id="game-container">
  <div id="header">
    <span id="level-display">Level 1</span>
    <span id="target-display">次: 1</span>
    <span id="time-display">32.0s</span>
  </div>
  <div id="timer-bar-container">
    <div id="timer-bar"></div>
  </div>
  <div id="shuffle-info">シャッフル率: 5%</div>
  <div id="play-area">
    <div id="overlay">
      <h2>数字タッチ</h2>
      <p class="sub">
        1から順番に数字をタップしよう！<br>
        タップするたびに確率でシャッフル<br>
        Level 5からボールが動き出す
      </p>
      <button class="action-btn" onclick="startGame()">スタート</button>
    </div>
  </div>
</div>

<script>
  const NUM_COUNT = 15;
  const BTN  = 50;
  const R    = BTN / 2;
  const GAP  = 8;
  const STEP = BTN + GAP;

  let level, timeLimitSec, timeLeft;
  let currentTarget, gameActive;
  let buttons = {};
  let timerInterval = null;
  let bestLevel = parseInt(localStorage.getItem('numtouch_best') || '0');

  // 物理演算の状態
  let physicsMode = false;
  let balls = [];
  let animFrame = null;
  let lastTime = null;

  function getAreaSize() {
    const el = document.getElementById('play-area');
    return { w: el.offsetWidth, h: el.offsetHeight };
  }

  function getTimeLimit(lv)   { return Math.max(8, 32 - (lv - 1) * 3); }
  function getShuffleProb(lv) { return Math.min(20, 4 + lv); }
  // Level5=120px/s, 1レベルごとに+20px/s, 上限250px/s
  function getBallSpeed(lv)   { return Math.min(250, 120 + (lv - 5) * 20); }
  // 数字ごとに色相を24度ずつずらした15色
  function getBallColor(n) {
    const h = (n - 1) * 24;
    return { bg: `hsl(${h},65%,42%)`, border: `hsl(${h},75%,62%)` };
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function generatePositions(count) {
    const { w, h } = getAreaSize();
    const cols = Math.floor((w - GAP) / STEP);
    const rows = Math.floor((h - GAP) / STEP);
    const all = [];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        all.push({ x: GAP + c * STEP, y: GAP + r * STEP });
      }
    }
    return shuffle(all).slice(0, count);
  }

  function renderNumbers(nums) {
    document.querySelectorAll('.num-btn').forEach(b => b.remove());
    buttons = {};
    const positions = generatePositions(nums.length);
    const playArea = document.getElementById('play-area');

    nums.forEach((n, i) => {
      const btn = document.createElement('button');
      btn.className = 'num-btn' + (level >= 5 ? ' physics' : '');
      btn.textContent = n;
      const { bg, border } = getBallColor(n);
      btn.style.background   = bg;
      btn.style.borderColor  = border;
      btn.style.color        = '#fff';
      btn.style.left = positions[i].x + 'px';
      btn.style.top  = positions[i].y + 'px';
      btn.addEventListener('click', () => onNumberClick(n, btn));
      playArea.appendChild(btn);
      buttons[n] = btn;
    });
  }

  // ===== シャッフル =====
  function shuffleRemainingPositions() {
    if (physicsMode) {
      // 物理モード: 速度の向きをランダム化（速さは維持）
      for (const b of balls) {
        const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
        const angle = Math.random() * Math.PI * 2;
        b.vx = Math.cos(angle) * speed;
        b.vy = Math.sin(angle) * speed;
      }
    } else {
      const remaining = Object.keys(buttons).map(Number);
      const positions = generatePositions(remaining.length);
      remaining.forEach((n, i) => {
        buttons[n].style.left = positions[i].x + 'px';
        buttons[n].style.top  = positions[i].y + 'px';
      });
    }
  }

  // ===== 物理演算 =====
  function initPhysics() {
    const speed = getBallSpeed(level);
    balls = Object.keys(buttons).map(n => {
      const btn = buttons[n];
      const x = parseFloat(btn.style.left) + R;
      const y = parseFloat(btn.style.top)  + R;
      const angle = Math.random() * Math.PI * 2;
      const v = speed * (0.8 + Math.random() * 0.4);
      return { n: parseInt(n), x, y, vx: Math.cos(angle) * v, vy: Math.sin(angle) * v };
    });
    lastTime = null;
    animFrame = requestAnimationFrame(physicsTick);
  }

  function stopPhysics() {
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    physicsMode = false;
    balls = [];
  }

  function physicsTick(ts) {
    if (!gameActive) return;
    if (lastTime === null) lastTime = ts;
    const dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;

    const { w, h } = getAreaSize();

    // 位置更新 & 壁との弾性衝突（反発係数1）
    for (const b of balls) {
      b.x += b.vx * dt;
      b.y += b.vy * dt;

      if (b.x - R < 0)   { b.x = R;     b.vx =  Math.abs(b.vx); }
      if (b.x + R > w)   { b.x = w - R; b.vx = -Math.abs(b.vx); }
      if (b.y - R < 0)   { b.y = R;     b.vy =  Math.abs(b.vy); }
      if (b.y + R > h)   { b.y = h - R; b.vy = -Math.abs(b.vy); }
    }

    // ボール同士の弾性衝突（反発係数1・等質量）
    for (let i = 0; i < balls.length; i++) {
      for (let j = i + 1; j < balls.length; j++) {
        const a = balls[i], b = balls[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const d  = Math.sqrt(dx * dx + dy * dy);
        if (d < BTN && d > 0) {
          const nx = dx / d, ny = dy / d;
          // めり込み解消
          const ov = (BTN - d) / 2;
          a.x -= nx * ov; a.y -= ny * ov;
          b.x += nx * ov; b.y += ny * ov;
          // 法線方向の速度を交換（等質量弾性衝突）
          const dot = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;
          if (dot > 0) {
            a.vx -= dot * nx; a.vy -= dot * ny;
            b.vx += dot * nx; b.vy += dot * ny;
          }
        }
      }
    }

    // DOM位置を更新
    for (const b of balls) {
      const btn = buttons[b.n];
      if (btn) {
        btn.style.left = (b.x - R) + 'px';
        btn.style.top  = (b.y - R) + 'px';
      }
    }

    animFrame = requestAnimationFrame(physicsTick);
  }

  // ===== クリック処理 =====
  function onNumberClick(n, btn) {
    if (!gameActive) return;

    if (n === currentTarget) {
      btn.classList.add('correct');
      delete buttons[n];
      if (physicsMode) balls = balls.filter(b => b.n !== n);

      setTimeout(() => {
        btn.remove();
        currentTarget++;

        if (currentTarget > NUM_COUNT) {
          levelClear();
        } else {
          document.getElementById('target-display').textContent = `次: ${currentTarget}`;
          if (Math.random() * 100 < getShuffleProb(level)) {
            shuffleRemainingPositions();
          }
        }
      }, 220);
    } else {
      btn.classList.add('wrong');
      timeLeft = Math.max(0, timeLeft - 2);
      setTimeout(() => btn.classList.remove('wrong'), 300);
    }
  }

  // ===== ゲーム制御 =====
  function startGame() {
    level = 1;
    startLevel();
  }

  function startLevel() {
    timeLimitSec  = getTimeLimit(level);
    timeLeft      = timeLimitSec;
    currentTarget = 1;
    gameActive    = true;
    physicsMode   = level >= 5;

    const prob = getShuffleProb(level);
    document.getElementById('level-display').textContent  = `Level ${level}`;
    document.getElementById('target-display').textContent = '次: 1';
    document.getElementById('shuffle-info').textContent   =
      `シャッフル率: ${prob}%${physicsMode ? ' ⚡ 物理モード' : ''}`;
    document.getElementById('overlay').style.display      = 'none';

    renderNumbers(Array.from({ length: NUM_COUNT }, (_, i) => i + 1));

    if (physicsMode) initPhysics();

    clearInterval(timerInterval);
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      timeLeft -= 0.1;
      if (timeLeft <= 0) {
        timeLeft = 0;
        updateTimerDisplay();
        gameOver();
      } else {
        updateTimerDisplay();
      }
    }, 100);
  }

  function updateTimerDisplay() {
    const ratio = timeLeft / timeLimitSec;
    const bar   = document.getElementById('timer-bar');
    bar.style.width = (ratio * 100) + '%';

    if (ratio > 0.5)       bar.style.backgroundColor = '#00e676';
    else if (ratio > 0.25) bar.style.backgroundColor = '#ffcc00';
    else                   bar.style.backgroundColor = '#ff1744';

    const el = document.getElementById('time-display');
    el.textContent = timeLeft.toFixed(1) + 's';
    el.style.color = ratio <= 0.25 ? '#ff1744' : '#fff';
  }

  function levelClear() {
    gameActive = false;
    clearInterval(timerInterval);
    stopPhysics();

    if (level > bestLevel) {
      bestLevel = level;
      localStorage.setItem('numtouch_best', bestLevel);
    }

    const nextLv   = level + 1;
    const nextSec  = getTimeLimit(nextLv);
    const nextProb = getShuffleProb(nextLv);
    const nextPhys = nextLv >= 5;

    const overlay = document.getElementById('overlay');
    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <h2>Level ${level} クリア！</h2>
      <p class="sub">残り時間: ${timeLeft.toFixed(1)}s</p>
      <p class="next-info">${nextSec}秒 / シャッフル率: ${nextProb}%${nextPhys ? '<br>⚡ 物理モード' : ''}</p>
      <button class="action-btn" onclick="goNextLevel()">Level ${nextLv} へ</button>
    `;
    level++;
  }

  function goNextLevel() {
    startLevel();
  }

  function gameOver() {
    gameActive = false;
    clearInterval(timerInterval);
    stopPhysics();

    const overlay = document.getElementById('overlay');
    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <h2>ゲームオーバー</h2>
      <p class="sub">Level ${level} &nbsp;|&nbsp; ${currentTarget - 1} / ${NUM_COUNT} 到達</p>
      <p class="best-badge">ベスト: Level ${bestLevel}</p>
      <button class="action-btn" onclick="startGame()">もう一度</button>
    `;
  }
</script>
</body>
</html>
