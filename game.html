<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数字タッチ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Arial', sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #game-container {
      width: 660px;
    }

    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 0 4px;
    }

    #level-display { font-size: 18px; color: #aaa; }

    #target-display {
      font-size: 22px;
      font-weight: bold;
      background: #0f3460;
      padding: 6px 20px;
      border-radius: 20px;
    }

    #time-display {
      font-size: 22px;
      font-weight: bold;
      font-variant-numeric: tabular-nums;
      min-width: 60px;
      text-align: right;
    }

    #timer-bar-container {
      width: 100%;
      height: 10px;
      background: #333;
      border-radius: 5px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    #timer-bar {
      height: 100%;
      width: 100%;
      background: #00e676;
      border-radius: 5px;
      transition: background-color 0.4s;
    }

    #play-area {
      position: relative;
      width: 660px;
      height: 440px;
      background: #16213e;
      border-radius: 16px;
      border: 2px solid #0f3460;
      overflow: hidden;
    }

    .num-btn {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid #1a4a8a;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      background: #0d2c5e;
      color: #cce;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      transition: left 0.18s ease, top 0.18s ease;
    }

    .num-btn:hover {
      background: #1a5faa;
      border-color: #4a9eff;
      color: #fff;
      transform: scale(1.08);
    }

    .num-btn.correct {
      background: #00e676 !important;
      border-color: #00e676;
      color: #000;
      transform: scale(1.2);
      pointer-events: none;
      z-index: 10;
    }

    .num-btn.wrong {
      animation: shake 0.3s ease;
      background: #c62828;
      border-color: #ff5252;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-7px); }
      60%       { transform: translateX(7px); }
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 10, 30, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      gap: 14px;
    }

    #overlay h2 {
      font-size: 38px;
      letter-spacing: 2px;
    }

    #overlay .sub {
      font-size: 16px;
      color: #88aacc;
      text-align: center;
      line-height: 1.8;
    }

    #overlay .next-info {
      font-size: 15px;
      color: #aaa;
    }

    .action-btn {
      padding: 13px 44px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    .action-btn:hover { background: #c73050; }

    .best-badge {
      font-size: 13px;
      color: #ffd700;
      margin-top: -6px;
    }
  </style>
</head>
<body>
<div id="game-container">
  <div id="header">
    <span id="level-display">Level 1</span>
    <span id="target-display">次: 1</span>
    <span id="time-display">30.0s</span>
  </div>
  <div id="timer-bar-container">
    <div id="timer-bar"></div>
  </div>
  <div id="play-area">
    <div id="overlay">
      <h2>数字タッチ</h2>
      <p class="sub">
        1から順番に数字をタップしよう！<br>
        タップするたびに数字の位置がシャッフルされる
      </p>
      <button class="action-btn" onclick="startGame()">スタート</button>
    </div>
  </div>
</div>

<script>
  const AREA_W = 660;
  const AREA_H = 440;
  const BTN = 60;
  const GAP = 8;
  const STEP = BTN + GAP;

  let level, maxNum, timeLimitSec, timeLeft;
  let currentTarget, gameActive;
  let buttons = {};
  let timerInterval = null;
  let bestLevel = parseInt(localStorage.getItem('numtouch_best') || '0');

  function getMaxNum(lv)   { return 10 + (lv - 1) * 5; }
  function getTimeLimit(lv){ return Math.max(8, 32 - (lv - 1) * 3); }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function generatePositions(count) {
    const cols = Math.floor((AREA_W - GAP) / STEP);
    const rows = Math.floor((AREA_H - GAP) / STEP);
    const all = [];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        all.push({
          x: GAP + c * STEP,
          y: GAP + r * STEP
        });
      }
    }
    return shuffle(all).slice(0, count);
  }

  function renderNumbers(nums) {
    document.querySelectorAll('.num-btn').forEach(b => b.remove());
    buttons = {};
    const positions = generatePositions(nums.length);
    const playArea = document.getElementById('play-area');

    nums.forEach((n, i) => {
      const btn = document.createElement('button');
      btn.className = 'num-btn';
      btn.textContent = n;
      btn.style.left = positions[i].x + 'px';
      btn.style.top  = positions[i].y + 'px';
      btn.addEventListener('click', () => onNumberClick(n, btn));
      playArea.appendChild(btn);
      buttons[n] = btn;
    });
  }

  function shuffleRemainingPositions() {
    const remaining = Object.keys(buttons).map(Number);
    const positions = generatePositions(remaining.length);
    remaining.forEach((n, i) => {
      buttons[n].style.left = positions[i].x + 'px';
      buttons[n].style.top  = positions[i].y + 'px';
    });
  }

  function onNumberClick(n, btn) {
    if (!gameActive) return;

    if (n === currentTarget) {
      btn.classList.add('correct');
      delete buttons[n];

      setTimeout(() => {
        btn.remove();
        currentTarget++;

        if (currentTarget > maxNum) {
          levelClear();
        } else {
          document.getElementById('target-display').textContent = `次: ${currentTarget}`;
          shuffleRemainingPositions();
        }
      }, 220);
    } else {
      btn.classList.add('wrong');
      timeLeft = Math.max(0, timeLeft - 2);
      setTimeout(() => btn.classList.remove('wrong'), 300);
    }
  }

  function startGame() {
    level = 1;
    startLevel();
  }

  function startLevel() {
    maxNum        = getMaxNum(level);
    timeLimitSec  = getTimeLimit(level);
    timeLeft      = timeLimitSec;
    currentTarget = 1;
    gameActive    = true;

    document.getElementById('level-display').textContent  = `Level ${level}`;
    document.getElementById('target-display').textContent = '次: 1';
    document.getElementById('overlay').style.display      = 'none';

    renderNumbers(Array.from({ length: maxNum }, (_, i) => i + 1));

    clearInterval(timerInterval);
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      timeLeft -= 0.1;
      if (timeLeft <= 0) {
        timeLeft = 0;
        updateTimerDisplay();
        gameOver();
      } else {
        updateTimerDisplay();
      }
    }, 100);
  }

  function updateTimerDisplay() {
    const ratio = timeLeft / timeLimitSec;
    const bar   = document.getElementById('timer-bar');
    bar.style.width = (ratio * 100) + '%';

    if (ratio > 0.5)       bar.style.backgroundColor = '#00e676';
    else if (ratio > 0.25) bar.style.backgroundColor = '#ffcc00';
    else                   bar.style.backgroundColor = '#ff1744';

    const el = document.getElementById('time-display');
    el.textContent = timeLeft.toFixed(1) + 's';
    el.style.color = ratio <= 0.25 ? '#ff1744' : '#fff';
  }

  function levelClear() {
    gameActive = false;
    clearInterval(timerInterval);

    if (level > bestLevel) {
      bestLevel = level;
      localStorage.setItem('numtouch_best', bestLevel);
    }

    const nextLv  = level + 1;
    const nextNum = getMaxNum(nextLv);
    const nextSec = getTimeLimit(nextLv);

    const overlay = document.getElementById('overlay');
    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <h2>Level ${level} クリア！</h2>
      <p class="sub">残り時間: ${timeLeft.toFixed(1)}s</p>
      <p class="next-info">次: ${nextNum}個の数字 / ${nextSec}秒</p>
      <button class="action-btn" onclick="goNextLevel()">Level ${nextLv} へ</button>
    `;
    level++;
  }

  function goNextLevel() {
    startLevel();
  }

  function gameOver() {
    gameActive = false;
    clearInterval(timerInterval);

    const overlay = document.getElementById('overlay');
    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <h2>ゲームオーバー</h2>
      <p class="sub">Level ${level} &nbsp;|&nbsp; ${currentTarget - 1} / ${maxNum} 到達</p>
      <p class="best-badge">ベスト: Level ${bestLevel}</p>
      <button class="action-btn" onclick="startGame()">もう一度</button>
    `;
  }
</script>
</body>
</html>
